name: Security Scan

# IaC misconfig + secret scanning (Trivy). Replaces tfsec — Trivy's
# misconfig scanner runs the same AVD/tfsec check library.
# Posture: REPORT-ONLY. Uploads to the Security tab; never fails a PR.
# Tighten with exit-code: "1" once .trivyignore is tuned.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly drift scan for newly-disclosed checks
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy (IaC misconfig / secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to code scanning
    steps:
      # Actions pinned to commit SHAs (not @vN tags) so a re-tagged upstream
      # can't change scan behavior under us. Dependabot opens PRs to bump.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Token isn't needed after checkout — Trivy scans local files and no
          # later step pushes/fetches (the SARIF upload uses the security-events
          # GITHUB_TOKEN, not the persisted git credential). Dropping it shrinks
          # the blast radius if a downstream action is ever compromised.
          persist-credentials: false

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config # IaC mode (Terraform/HCL); the tfsec equivalent
          scanners: misconfig,secret
          format: sarif
          output: trivy.sarif
          exit-code: "0" # report-only
        env:
          TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy.sarif
          category: trivy
